global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: [ 'node_exporter:9100' ]

  - job_name: 'stub_http'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [ 'stub:8099' ]

  - job_name: 'stub_jvm'
    static_configs:
      - targets: [ 'stub:8098' ]